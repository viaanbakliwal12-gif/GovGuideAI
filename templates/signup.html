<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Sign up - GovGuideAI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  </head>
  <body data-require-language data-language-selected="{{ 'true' if session.get('language_selected') else 'false' }}" data-selected-language="{{ session.get('selected_language', '') }}" data-auth-page>
    <main class="auth-shell">
      <section class="auth-card" aria-labelledby="authTitle">
        <div class="brand-lockup">
          <span class="brand-mark" aria-hidden="true">G</span>
          <div>
            <p class="eyebrow" data-i18n="officialEyebrow">Official-source civic guidance</p>
            <h1>GovGuideAI</h1>
          </div>
        </div>
        <div class="auth-intro">
          <h2 id="authTitle" data-i18n="createAccount">Create Account</h2>
          <p class="privacy-copy" data-i18n="signupOtpCopy">Start with a verified email or phone number, then complete your profile for personalized guidance.</p>
        </div>
        {% if error %}<p class="notice error" {% if error_key %}data-i18n="{{ error_key }}"{% endif %}>{{ error }}</p>{% endif %}
        {% include "_auth_methods.html" %}
        <p class="form-footer"><span data-i18n="alreadyAccount">Already have an account?</span> <a href="{{ url_for('auth.login') }}" data-i18n="login">Login</a></p>
      </section>
    </main>
    <script src="{{ url_for('static', filename='js/i18n.js', v='20260715-language-fix') }}" defer></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}" defer></script>
  </body>
</html>
