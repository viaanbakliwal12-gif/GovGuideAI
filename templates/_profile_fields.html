<fieldset class="form-section">
  <legend>Basic details</legend>
  <div class="form-grid">
    <label><span data-i18n="fullName">Full name *</span>
      <input name="full_name" required autocomplete="name" value="{{ profile.full_name if profile else profile.get('full_name', '') if profile is mapping else '' }}">
    </label>
    <label><span data-i18n="ageDob">Age or date of birth *</span>
      <input name="age" required value="{{ profile.age if profile else profile.get('age', '') if profile is mapping else '' }}">
    </label>
    <label><span data-i18n="gender">Gender</span>
      <input name="gender" value="{{ profile.gender if profile and profile.gender else profile.get('gender', '') if profile is mapping else '' }}">
    </label>
    <label><span data-i18n="maritalStatus">Marital status</span>
      <input name="marital_status" value="{{ profile.marital_status if profile and profile.marital_status else profile.get('marital_status', '') if profile is mapping else '' }}">
    </label>
  </div>
</fieldset>

<fieldset class="form-section">
  <legend>Location</legend>
  <div class="form-grid">
    <label><span data-i18n="stateUt">State or Union Territory *</span>
      <input name="state" required value="{{ profile.state if profile else profile.get('state', '') if profile is mapping else '' }}">
    </label>
    <label><span data-i18n="district">District *</span>
      <input name="district" required value="{{ profile.district if profile else profile.get('district', '') if profile is mapping else '' }}">
    </label>
    <label><span data-i18n="locationType">Rural or urban *</span>
      <select name="location_type" required>
        {% set location = profile.location_type if profile and profile.location_type is defined else profile.get('location_type', '') if profile is mapping else '' %}
        <option value="" data-i18n="select">Select</option>
        <option value="Rural" {% if location == "Rural" %}selected{% endif %} data-i18n="rural">Rural</option>
        <option value="Urban" {% if location == "Urban" %}selected{% endif %} data-i18n="urban">Urban</option>
      </select>
    </label>
  </div>
</fieldset>

<fieldset class="form-section">
  <legend>Occupation and income</legend>
  <div class="form-grid">
    <label><span data-i18n="occupation">Occupation *</span>
      {% set occupation = profile.occupation if profile and profile.occupation is defined else profile.get('occupation', '') if profile is mapping else '' %}
      <select name="occupation" id="occupationSelect" required>
        <option value="" data-i18n="select">Select</option>
        <option value="student" {% if occupation == "student" %}selected{% endif %} data-i18n="student">Student</option>
        <option value="farmer" {% if occupation == "farmer" %}selected{% endif %} data-i18n="farmer">Farmer</option>
        <option value="employed" {% if occupation == "employed" %}selected{% endif %} data-i18n="employed">Employed</option>
        <option value="self_employed" {% if occupation == "self_employed" %}selected{% endif %} data-i18n="selfEmployed">Self-employed</option>
        <option value="business_owner" {% if occupation == "business_owner" %}selected{% endif %} data-i18n="businessOwner">Business owner</option>
        <option value="unemployed" {% if occupation == "unemployed" %}selected{% endif %} data-i18n="unemployed">Unemployed / None</option>
        <option value="retired" {% if occupation == "retired" %}selected{% endif %} data-i18n="retired">Retired</option>
        <option value="homemaker" {% if occupation == "homemaker" %}selected{% endif %} data-i18n="homemaker">Homemaker</option>
        <option value="other" {% if occupation == "other" %}selected{% endif %} data-i18n="other">Other</option>
      </select>
    </label>
    <label id="occupationCustomLabel" class="conditional-field"><span data-i18n="occupationOther">Custom occupation</span>
      <input name="occupation_custom" value="{{ profile.occupation_custom if profile and profile.occupation_custom else profile.get('occupation_custom', '') if profile is mapping else '' }}">
    </label>
    <label><span data-i18n="annualIncome">Annual household income range</span>
      <input name="annual_household_income_range" value="{{ profile.annual_household_income_range if profile and profile.annual_household_income_range else profile.get('annual_household_income_range', '') if profile is mapping else '' }}">
    </label>
    <label><span data-i18n="socialCategory">Social category, only if relevant</span>
      <input name="social_category" value="{{ profile.social_category if profile and profile.social_category else profile.get('social_category', '') if profile is mapping else '' }}">
    </label>
  </div>
</fieldset>

<fieldset class="form-section">
  <legend>Accessibility and preferences</legend>
  <div class="form-grid">
    <label><span data-i18n="preferredLanguage">Preferred language *</span>
      {% set language = profile.preferred_language if profile and profile.preferred_language is defined else profile.get('preferred_language', '') if profile is mapping else 'en' %}
      <select name="preferred_language" required data-language-select>
        <option value="en">English</option>
        <option value="hi">हिन्दी</option>
        <option value="mr">मराठी</option>
        <option value="bn">বাংলা</option>
        <option value="ta">தமிழ்</option>
        <option value="te">తెలుగు</option>
        <option value="gu">ગુજરાતી</option>
        <option value="kn">ಕನ್ನಡ</option>
        <option value="ml">മലയാളം</option>
        <option value="pa">ਪੰਜਾਬੀ</option>
        <option value="ur">اردو</option>
      </select>
    </label>
    <label><span data-i18n="disabilityStatus">Disability status</span>
      <input name="disability_status" value="{{ profile.disability_status if profile and profile.disability_status else profile.get('disability_status', '') if profile is mapping else '' }}">
    </label>
  </div>
</fieldset>
