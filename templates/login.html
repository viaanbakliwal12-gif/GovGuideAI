<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - GovGuideAI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  </head>
  <body>
    <main class="auth-shell">
      <section class="auth-card">
        <div class="brand-lockup">
          <span class="chakra-mark" aria-hidden="true"></span>
          <div>
            <p class="eyebrow">Official-source civic guidance</p>
            <h1>GovGuideAI</h1>
          </div>
        </div>
        <p class="privacy-copy">Log in to use your saved profile for personalized government-service and scheme suggestions.</p>
        {% if message %}<p class="notice success">{{ message }}</p>{% endif %}
        {% if error %}<p class="notice error">{{ error }}</p>{% endif %}
        <form class="stacked-form" method="post" action="{{ url_for('auth.login') }}">
          <label>Email <input name="email" type="email" required autocomplete="email"></label>
          <label>Password <input name="password" type="password" required autocomplete="current-password"></label>
          <button class="primary-button" type="submit">Login</button>
        </form>
        <p class="form-footer">New here? <a href="{{ url_for('auth.signup') }}">Create an account</a></p>
      </section>
    </main>
    <script src="{{ url_for('static', filename='js/auth.js') }}" defer></script>
  </body>
</html>
