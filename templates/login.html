<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - GovGuideAI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  </head>
  <body data-require-language>
    <main class="auth-shell">
      <section class="auth-card">
        <div class="brand-lockup">
          <span class="brand-mark" aria-hidden="true">G</span>
          <div>
            <p class="eyebrow" data-i18n="officialEyebrow">Official-source civic guidance</p>
            <h1>GovGuideAI</h1>
          </div>
        </div>
        <div class="auth-intro">
          <h2 data-i18n="login">Login</h2>
          <p class="privacy-copy" data-i18n="loginCopy">Log in to use your saved profile for personalized government-service and scheme suggestions.</p>
        </div>
        {% if message %}<p class="notice success">{{ message }}</p>{% endif %}
        {% if error %}<p class="notice error">{{ error }}</p>{% endif %}
        <form class="stacked-form" method="post" action="{{ url_for('auth.login') }}">
          <input type="hidden" name="selected_language" value="en">
          <label><span data-i18n="email">Email</span> <input name="email" type="email" required autocomplete="email"></label>
          <label><span data-i18n="password">Password</span> <input name="password" type="password" required autocomplete="current-password"></label>
          <button class="primary-button" type="submit" data-i18n="login">Login</button>
        </form>
        <p class="form-footer"><span data-i18n="newHere">New here?</span> <a href="{{ url_for('auth.signup') }}" data-i18n="createAccount">Create an account</a></p>
      </section>
    </main>
    <script src="{{ url_for('static', filename='js/i18n.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}" defer></script>
  </body>
</html>
